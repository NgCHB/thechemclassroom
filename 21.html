<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root{
    --bg: #FAFAF7;
    --ink: #1B211F;
    --ink-soft: #5B6360;
    --teal: #2C6E63;
    --teal-deep: #1F4F47;
    --amber: #E8A23B;
    --line: #DEDDD5;
    --tile-bg: #FFFFFF;
    --radius: 3px;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html{ scroll-behavior: smooth; }

  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }

  a{ color: inherit; }

  /* ---------- Header ---------- */

  header{
    padding: 2.75rem 1.5rem 2rem;
    text-align: center;
    border-bottom: 1px solid var(--line);
  }

  .back-link{
    display:inline-flex;
    align-items:center;
    gap: 0.35rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.03em;
    color: var(--ink-soft);
    text-decoration: none;
    margin-bottom: 1.4rem;
  }

  .back-link:hover{ color: var(--teal); }

  h1{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(1.6rem, 4.5vw, 2.4rem);
    letter-spacing: -0.02em;
    line-height: 1.05;
    color: var(--teal);
  }

  h1 .topic-no{ color: var(--teal); }

  h1 .divider{
    color: var(--teal);
    font-weight: 400;
    margin: 0 0.5rem;
  }

  /* ---------- Tabs ---------- */

  nav.tabs{
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    display:flex;
    justify-content:center;
    flex-wrap: wrap;
    gap: 0.25rem;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--line);
  }

  nav.tabs button{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 0.01em;
    color: var(--ink-soft);
    background: none;
    border: none;
    padding: 0.55rem 1.1rem;
    cursor: pointer;
    border-radius: 999px;
    transition: color 0.15s ease, background 0.15s ease;
  }

  nav.tabs button:hover{ color: var(--ink); }

  nav.tabs button.active{
    color: var(--bg);
    background: var(--ink);
  }

  nav.tabs button:focus-visible,
  .video-placeholder:focus-visible{
    outline: 2px solid var(--teal);
    outline-offset: 2px;
  }

  /* ---------- Main / panels ---------- */

  main{
    max-width: 760px;
    margin: 0 auto;
    padding: 2.75rem 1.5rem 5rem;
  }

  .panel{ display:none; }
  .panel.active{ display:block; animation: fade 0.35s ease; }

  @keyframes fade{
    from{ opacity:0; transform: translateY(4px); }
    to{ opacity:1; transform: translateY(0); }
  }

  /* ---------- Video placeholder ---------- */

  .video-placeholder{
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: var(--tile-bg);
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap: 0.75rem;
  }

  .video-placeholder .play{
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .video-placeholder .play svg{ width: 16px; height: 16px; }

  .video-placeholder .label{
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  /* ---------- Content placeholder ---------- */

  .content-placeholder{
    margin-top: 1.25rem;
    padding: 1.75rem;
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    min-height: 140px;
  }

  .content-placeholder .label{
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    color: var(--ink-soft);
  }

  /* ---------- Footer ---------- */

  footer{
    text-align:center;
    padding: 2rem 1.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-soft);
    border-top: 1px solid var(--line);
  }
</style>
</head>
<body>

<header>

<nav class="tabs" role="tablist" aria-label="Lessons">

<footer>THE CHEMISTRY CLASSROOM &middot; @bernardng</footer>

<script>
  const tabBtns = document.querySelectorAll('.tab-btn');
  const panels = document.querySelectorAll('.panel');

  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tabBtns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
      panels.forEach(p => p.classList.remove('active'));

      btn.classList.add('active');
      btn.setAttribute('aria-selected','true');
      document.getElementById(btn.dataset.panel).classList.add('active');
    });
  });
</script>
